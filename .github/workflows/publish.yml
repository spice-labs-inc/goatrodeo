name: Scala Build, Publish, and CLI Scan  # goatrodeo

on:
  push:
    tags: [ "v*.*.*" ]     # semantic tag releases
  release:
    types: [ published ]   # support UI Releases too
  workflow_dispatch: {}

env:
  IMAGE_REPO: spicelabs/goatrodeo
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  verify-main:
    name: Verify tag commit is on main
    runs-on: ubuntu-24.04
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine ref (tag) for this run
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check ancestry
        id: check
        shell: bash
        run: |
          git fetch origin main --depth=1
          TAG_SHA="${GITHUB_SHA}"
          if git merge-base --is-ancestor "$TAG_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  publish-jars:
    name: Publish JARs to GitHub Packages
    needs: verify-main
    if: >
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.ref, 'refs/tags/v') && needs.verify-main.outputs.on_main == 'true') ||
      (github.event_name == 'release' && github.event.action == 'published' &&
       startsWith(github.event.release.tag_name, 'v') && needs.verify-main.outputs.on_main == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_timestamp: ${{ steps.release-notification.outputs.timestamp }}
      release_channel_id: ${{ steps.release-notification.outputs.channel_id }}
    steps:
      - name: Notify release (start thread)
        id: release-notification
        uses: spice-labs-inc/action-release-notification@main
        with:
          type: release
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          username-mapping: ${{ secrets.GH_SLACK_USERNAME_MAPPING }}
          github-token: ${{ github.token }}

      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "sbt"

      - name: Set up SBT
        uses: sbt/setup-sbt@v1

      - name: Derive and validate version (from tag or release)
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          V="${TAG#v}"
          [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid semver: $V"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "projectVersion=$V" >> "$GITHUB_ENV"

      - name: Publish standard and fat JARs to GitHub Packages
        run: |
          SBT_OPTS="-Xmx8G -Duser.timezone=GMT" sbt \
            "set ThisBuild / version := \"${{ env.projectVersion }}\"" \
            +publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TARGET: github

  publish-to-central:
    name: Re-publish to Maven Central
    needs: publish-jars
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Maven)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Write settings.xml for Central
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.MAVEN_CENTRAL_USERNAME}</username>
                <password>${env.MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Import GPG key
        run: |
          echo "${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys || true

      - name: Set project version from tag
        run: |
          mvn -B --file maven/pom.xml \
              clean versions:set -DnewVersion="${{ needs.publish-jars.outputs.version }}" -DgenerateBackupPoms=false

      - name: Create target dir
        run: mkdir -p maven/target/external

      - name: Download artifacts from GitHub Maven
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish-jars.outputs.version }}
        run: |
          ARTIFACTS=(
            "goatrodeo_3-${VERSION}.jar"
            "goatrodeo_3-${VERSION}-sources.jar"
            "goatrodeo_3-${VERSION}-javadoc.jar"
            "goatrodeo_3-${VERSION}.pom"
            "goatrodeo_3-${VERSION}-fat.jar"
          )
          for file in "${ARTIFACTS[@]}"; do
            echo "Downloading $file"
            curl -fL -o "maven/target/external/$file" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/octet-stream" \
              "https://maven.pkg.github.com/spice-labs-inc/goatrodeo/io/spicelabs/goatrodeo_3/${VERSION}/${file}"
          done

      - name: Inject real dependencies into fake pom.xml
        run: |
          set -e
          VERSION="${{ needs.publish-jars.outputs.version }}"
          REAL_POM="maven/target/external/goatrodeo_3-${VERSION}.pom"
          FAKE_POM="maven/pom.xml"
          real_deps=$(awk '/<dependencies>/,/<\/dependencies>/' "$REAL_POM")
          awk -v repl="$real_deps" '
            /<!-- @REAL_DEPENDENCIES@ -->/ {print repl; next}
            {print}
          ' "$FAKE_POM" > "${FAKE_POM}.tmp" && mv "${FAKE_POM}.tmp" "$FAKE_POM"

      - name: Publish to Maven Central (staging)
        run: |
          cd maven
          mvn --batch-mode deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

  docker-image:
    name: Build & push Docker image (Docker Hub)
    needs: publish-jars
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download fat JAR from GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fL -o goatrodeo-fat.jar \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/goatrodeo/io/spicelabs/goatrodeo_3/${{ needs.publish-jars.outputs.version }}/goatrodeo_3-${{ needs.publish-jars.outputs.version }}-fat.jar"
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Compute Docker tags (semver + sha)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=semver,pattern={{version}},value=${{ needs.publish-jars.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.publish-jars.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.publish-jars.outputs.version }}
          flavor: |
            latest=false
      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Verify SHA tag exists (eventual consistency)
        shell: bash
        run: |
          for i in {1..10}; do
            if docker buildx imagetools inspect ${{ env.IMAGE_REPO }}:sha-${{ github.sha }} >/dev/null 2>&1; then
              echo "Found ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}"
              exit 0
            fi
            echo "Waiting for SHA tag to be visible ($i/10)..."; sleep 6
          done
          exit 1
      - name: Resolve image digest for provenance
        id: digest
        shell: bash
        run: |
          RAW="$(docker buildx imagetools inspect ${{ env.IMAGE_REPO }}:sha-${{ github.sha }} --raw)"
          DIGEST="$(printf "%s" "$RAW" | jq -r '.manifests[0].digest // .digest')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance (GitHub Attestations)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/${{ env.IMAGE_REPO }}
          subject-digest: ${{ steps.digest.outputs.digest }}

  tag-latest:
    name: Tag :latest (only if not prerelease)
    needs: docker-image
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ubuntu-24.04
    steps:
      - name: Determine prerelease (if Release exists)
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const evt = context.payload
            const tag = evt.release?.tag_name || process.env.GITHUB_REF.replace('refs/tags/','')
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag
              })
              core.setOutput('prerelease', String(Boolean(data.prerelease)))
            } catch {
              core.setOutput('prerelease', 'false')
            }
      - name: Mirror sha tag → :latest with skopeo
        if: steps.meta.outputs.prerelease == 'false'
        run: |
          docker run --rm quay.io/skopeo/stable:latest copy \
            --src-creds "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_TOKEN }}" \
            --dest-creds "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_TOKEN }}" \
            docker://${{ env.IMAGE_REPO }}:sha-${{ github.sha }} \
            docker://${{ env.IMAGE_REPO }}:latest

  extract-adg:
    name: Compliance scan (exact image + JARs)
    needs: docker-image
    runs-on: ubuntu-24.04
    steps:
      - name: Create target/ and download artifacts for scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish-jars.outputs.version }}
        run: |
          mkdir -p target
          curl -fL -o "target/goatrodeo_3-${VERSION}.jar" \
            -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/goatrodeo/io/spicelabs/goatrodeo_3/${VERSION}/goatrodeo_3-${VERSION}.jar"
          curl -fL -o "target/goatrodeo_3-${VERSION}.pom" \
            -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/goatrodeo/io/spicelabs/goatrodeo_3/${VERSION}/goatrodeo_3-${VERSION}.pom"
          curl -fL -o "target/goatrodeo_3-${VERSION}-fat.jar" \
            -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/goatrodeo/io/spicelabs/goatrodeo_3/${VERSION}/goatrodeo_3-${VERSION}-fat.jar"
      - name: Extract image (OCI layout from Docker Hub)
        uses: spice-labs-inc/action-extract-image@v1
        with:
          registry: docker.io
          image_name: ${{ env.IMAGE_REPO }}
          tag: sha-${{ github.sha }}
          path: target
      - name: Index and upload ADG (Spice-Labs CLI)
        uses: spice-labs-inc/action-spice-labs-cli-scan@v3
        with:
          spice_pass: ${{ secrets.SPICE_PASS }}
          file_path: ${{ github.workspace }}/target
          tag: goatrodeo

  notify:
    needs: [publish-jars, publish-to-central, docker-image]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Build deployment result message
        id: deployment-status
        shell: bash
        run: |
          JARS_STATUS="${{ needs.publish-jars.result }}"
          CENTRAL_STATUS="${{ needs.publish-to-central.result }}"
          DOCKER_STATUS="${{ needs.docker-image.result }}"
          if [ "$JARS_STATUS" = "success" ] && [ "$CENTRAL_STATUS" = "success" ] && [ "$DOCKER_STATUS" = "success" ]; then
            echo "overall_status=success" >> $GITHUB_OUTPUT
            echo "message=All components published successfully." >> $GITHUB_OUTPUT
          else
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            MESSAGE="Publishing failed:"
            if [ "$JARS_STATUS" != "success" ]; then MESSAGE="$MESSAGE SBT JAR publishing failed."; else MESSAGE="$MESSAGE SBT JAR publishing succeeded."; fi
            if [ "$CENTRAL_STATUS" != "success" ]; then MESSAGE="$MESSAGE Maven Central publishing failed."; else MESSAGE="$MESSAGE Maven Central publishing succeeded."; fi
            if [ "$DOCKER_STATUS" != "success" ]; then MESSAGE="$MESSAGE Docker build/push failed."; else MESSAGE="$MESSAGE Docker build/push succeeded."; fi
            echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          fi
      - name: Notify deployment result
        uses: spice-labs-inc/action-release-notification@main
        with:
          type: ${{ steps.deployment-status.outputs.overall_status == 'success' && 'deployment-success' || 'deployment-failure' }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          username-mapping: ${{ secrets.GH_SLACK_USERNAME_MAPPING }}
          workflow-name: Release
          environment: production
          thread-ts: ${{ needs.publish-jars.outputs.release_timestamp }}
          channel-id: ${{ needs.publish-jars.outputs.release_channel_id }}
