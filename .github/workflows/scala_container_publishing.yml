name: Debug Publish Scala Container Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["Scala Build & Test"]
    types: [completed]
    branches:
      - "main"
      - "publish-images"

jobs:
  debug_job:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event.push.ref_type == 'tag') }}
    steps:
      - name: Debugging
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref Type: ${{ github.ref_type }}"
          echo "Workflow Run Event Ref Type: ${{ github.event.workflow_run.event.push.ref_type }}"